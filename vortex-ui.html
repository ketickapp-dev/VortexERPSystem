<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fallback Background jika CDN lambat */
        html, body {
            background-color: #05070a !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        .glow-card {
            background: linear-gradient(135deg, #00d4ff 0%, #0055ff 100%);
            padding: 1.5px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .glass-inner {
            background: rgba(10, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 23px;
            padding: 30px;
        }

        /* Animasi Nadi */
        .pulse {
            height: 10px;
            width: 10px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse-web 2s infinite;
        }

        @keyframes pulse-web {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 1; }
        }
    </style>
</head>
<body>

    <div style="position: fixed; inset: 0; z-index: 0; opacity: 0.3;">
        <svg width="100%" height="100%">
            <rect x="-100%" y="25%" width="100%" height="1" fill="#00d4ff">
                <animate attributeName="x" from="-100%" to="100%" dur="7s" repeatCount="indefinite" />
            </rect>
            <rect x="-100%" y="60%" width="100%" height="1" fill="#00d4ff">
                <animate attributeName="x" from="-100%" to="100%" dur="10s" repeatCount="indefinite" begin="2s" />
            </rect>
        </svg>
    </div>

    <div class="glow-card">
        <div class="glass-inner">
            <div class="flex justify-between items-center mb-6">
                <span style="font-size: 10px; letter-spacing: 0.3em; color: #22d3ee; font-weight: bold; text-transform: uppercase;">Vortex ERP</span>
                <span class="pulse"></span>
            </div>
            
            <h1 class="text-2xl font-bold mb-2">Vortex Intelligence</h1>
            <p class="text-gray-400 text-sm mb-8">Sistem pengurusan modular berkuasa tinggi untuk masa hadapan.</p>
            
            <div class="bg-black/40 p-4 rounded-xl border border-white/5 mb-6">
                <div class="flex justify-between text-[10px] mb-2 text-gray-500 font-bold uppercase">
                    <span>Core Security</span>
                    <span class="text-cyan-400">Active</span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-1">
                    <div class="bg-cyan-500 h-1 rounded-full" style="width: 85%"></div>
                </div>
            </div>

            <button onclick="alert('System Launching...')" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold tracking-widest uppercase transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                Launch System
            </button>
        </div>
    </div>

</body>
</html>
