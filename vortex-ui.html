<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-dark: #05070a;
            --vortex-blue: #00d4ff;
        }

        body {
            background-color: var(--bg-dark);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Responsive Card Width */
        .glow-card {
            position: relative;
            width: 90%; /* Default untuk mobile */
            max-width: 400px; /* Limit untuk Desktop/Tablet */
            padding: 1.5px;
            border-radius: 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #0055ff 100%);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
            z-index: 10;
        }

        .glass-inner {
            background: rgba(10, 14, 20, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 23px;
            padding: 30px;
        }

        /* Pulse Animation */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        /* Smooth floating animation */
        .floating {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="fixed inset-0 z-0 opacity-40">
        <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0" />
                    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.8" />
                    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
                </linearGradient>
            </defs>
            <rect x="-100%" y="15%" width="100%" height="1" fill="url(#lineGrad)">
                <animate attributeName="x" from="-100%" to="100%" dur="6s" repeatCount="indefinite" />
            </rect>
            <rect x="-100%" y="40%" width="100%" height="1.5" fill="url(#lineGrad)">
                <animate attributeName="x" from="-100%" to="100%" dur="10s" repeatCount="indefinite" begin="2s" />
            </rect>
            <rect x="-100%" y="65%" width="100%" height="1" fill="url(#lineGrad)">
                <animate attributeName="x" from="-100%" to="100%" dur="8s" repeatCount="indefinite" begin="1s" />
            </rect>
            <rect x="-100%" y="85%" width="100%" height="1" fill="url(#lineGrad)">
                <animate attributeName="x" from="-100%" to="100%" dur="12s" repeatCount="indefinite" begin="4s" />
            </rect>
        </svg>
    </div>

    <div class="glow-card floating">
        <div class="glass-inner text-center md:text-left">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Vortex ERP</span>
                <div class="flex items-center gap-2">
                    <span class="status-dot"></span>
                </div>
            </div>
            
            <h1 class="text-2xl md:text-3xl font-bold mb-3 tracking-tight">Vortex ERP System</h1>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">
                Platform pengurusan perniagaan modular yang pantas, selamat, dan futuristik.
            </p>
            
            <div class="space-y-6">
                <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                    <div class="flex justify-between text-[11px] mb-2 uppercase tracking-widest text-gray-500 font-bold">
                        <span>System Load</span>
                        <span class="text-cyan-400">Optimal</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-1">
                        <div class="bg-cyan-500 h-1 rounded-full shadow-[0_0_10px_#00d4ff]" style="width: 45%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                        <div class="text-[10px] text-gray-500 uppercase font-bold">Uptime</div>
                        <div class="text-lg font-mono">99.9%</div>
                    </div>
                    <div class="bg-white/5 p-3 rounded-lg border border-white/10">
                        <div class="text-[10px] text-gray-500 uppercase font-bold">Nodes</div>
                        <div class="text-lg font-mono">12 Active</div>
                    </div>
                </div>
            </div>

            <button class="mt-8 w-full py-4 bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-[1.02] active:scale-95 transition-all rounded-2xl font-bold tracking-widest uppercase shadow-lg shadow-blue-500/20">
                Launch Dashboard
            </button>
        </div>
    </div>

</body>
</html>
