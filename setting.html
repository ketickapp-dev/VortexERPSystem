<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex | System Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Mono&display=swap');

        html, body {
            background-color: #030406 !important;
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #030406 80%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        .glass-panel {
            background: rgba(10, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 30px;
        }

        .input-vortex {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-vortex:focus {
            border-color: #00d4ff;
            outline: none;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
        }

        .step-dot.active {
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
            transform: scale(1.3);
        }

        .hidden-step { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="w-full max-w-2xl glass-panel p-8 md:p-12 relative overflow-hidden">
        
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-bold tracking-tighter uppercase font-mono">System Initialization</h1>
            <div class="flex justify-center gap-4 mt-6">
                <div id="dot1" class="step-dot active"></div>
                <div id="dot2" class="step-dot"></div>
                <div id="dot3" class="step-dot"></div>
            </div>
        </div>

        <form id="setupForm" class="space-y-8">
            
            <div id="step1" class="space-y-6">
                <div class="border-l-2 border-cyan-500 pl-4 mb-8">
                    <h2 class="text-cyan-400 font-bold uppercase text-xs tracking-widest">Phase 01</h2>
                    <p class="text-xl font-semibold">Database Connection</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Firebase API Key</label>
                        <input type="text" class="input-vortex" placeholder="AIzaSy...">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Auth Domain</label>
                        <input type="text" class="input-vortex" placeholder="project-name.firebaseapp.com">
                    </div>
                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Project ID</label>
                        <input type="text" class="input-vortex" placeholder="vortex-os-77">
                    </div>
                </div>

                <div class="pt-6">
                    <button type="button" onclick="nextStep(2)" class="w-full py-4 bg-cyan-600 rounded-xl font-bold text-xs uppercase tracking-[0.2em] hover:bg-cyan-500 transition-all shadow-lg shadow-cyan-500/20">
                        Establish Connection →
                    </button>
                </div>
            </div>

            <div id="step2" class="hidden-step space-y-6">
                <div class="border-l-2 border-purple-500 pl-4 mb-8">
                    <h2 class="text-purple-400 font-bold uppercase text-xs tracking-widest">Phase 02</h2>
                    <p class="text-xl font-semibold">Corporate Identity</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Company Name</label>
                        <input type="text" class="input-vortex" placeholder="AzlanMymo Lab">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Phone Number</label>
                        <input type="text" class="input-vortex" placeholder="+6012...">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Reg No (SSM)</label>
                        <input type="text" class="input-vortex" placeholder="2024XXXXXX">
                    </div>
                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Full Address</label>
                        <textarea class="input-vortex h-20" placeholder="Street, City, Postcode, Malaysia"></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="nextStep(1)" class="flex-1 py-4 border border-white/10 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-white/5 transition-all">Back</button>
                    <button type="button" onclick="nextStep(3)" class="flex-[2] py-4 bg-purple-600 rounded-xl font-bold text-xs uppercase tracking-[0.2em] hover:bg-purple-500 transition-all shadow-lg shadow-purple-500/20">Financial Setup →</button>
                </div>
            </div>

            <div id="step3" class="hidden-step space-y-6">
                <div class="border-l-2 border-orange-500 pl-4 mb-8">
                    <h2 class="text-orange-400 font-bold uppercase text-xs tracking-widest">Phase 03</h2>
                    <p class="text-xl font-semibold">Bank & Digital Assets</p>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Bank Name</label>
                            <input type="text" class="input-vortex" placeholder="Maybank / CIMB">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Account No</label>
                            <input type="text" class="input-vortex" placeholder="162XXXXX">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Account Holder Name</label>
                        <input type="text" class="input-vortex" placeholder="NAMA PENUH">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 pt-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Company Logo</label>
                            <input type="file" class="text-[10px] text-gray-400 file:bg-cyan-600/20 file:border-0 file:text-cyan-400 file:px-4 file:py-2 file:rounded-lg file:mr-4 file:cursor-pointer">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-1 tracking-widest">Company Stamp (Cop)</label>
                            <input type="file" class="text-[10px] text-gray-400 file:bg-orange-600/20 file:border-0 file:text-orange-400 file:px-4 file:py-2 file:rounded-lg file:mr-4 file:cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="nextStep(2)" class="flex-1 py-4 border border-white/10 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-white/5 transition-all">Back</button>
                    <button type="submit" class="flex-[2] py-4 bg-orange-600 rounded-xl font-bold text-xs uppercase tracking-[0.2em] hover:brightness-110 transition-all shadow-lg shadow-orange-500/20">Finish & Save</button>
                </div>
            </div>

        </form>

        <div class="absolute -bottom-10 -right-10 text-[60px] opacity-[0.03] font-black pointer-events-none uppercase">Vortex</div>
    </div>

    <script>
        function nextStep(step) {
            // Sembunyikan semua langkah
            document.getElementById('step1').classList.add('hidden-step');
            document.getElementById('step2').classList.add('hidden-step');
            document.getElementById('step3').classList.add('hidden-step');

            // Reset dots
            document.getElementById('dot1').classList.remove('active');
            document.getElementById('dot2').classList.remove('active');
            document.getElementById('dot3').classList.remove('active');

            // Tunjukkan langkah yang dipilih
            document.getElementById('step' + step).classList.remove('hidden-step');
            document.getElementById('dot' + step).classList.add('active');
        }

        document.getElementById('setupForm').onsubmit = (e) => {
            e.preventDefault();
            alert('SYSTEM INITIALIZED: Data has been securely encrypted and stored in the node.');
            window.location.href = 'dashboard.html';
        };
    </script>

</body>
</html>
