<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Auth | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            background-color: #05070a !important;
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }

        .glass-login {
            background: rgba(10, 14, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 30px;
        }

        .input-vortex {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
        }

        .input-vortex:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            outline: none;
        }

        /* Animasi Scanner */
        .scanner-line {
            height: 2px;
            width: 100%;
            background: #00d4ff;
            box-shadow: 0 0 15px #00d4ff;
            position: absolute;
            top: 0;
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 overflow-hidden">

    <div class="relative w-full max-w-md glass-login p-8 md:p-12 shadow-2xl">
        <div class="absolute inset-0 overflow-hidden rounded-[30px] opacity-10 pointer-events-none">
            <div class="scanner-line"></div>
        </div>

        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-2xl bg-blue-500/10 mb-4">
                <span class="text-4xl">🔐</span>
            </div>
            <h2 class="text-2xl font-bold tracking-tight">Identity Verification</h2>
            <p class="text-gray-500 text-xs mt-2 uppercase tracking-widest">Access Restricted to Authorized Personnel</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">Admin ID</label>
                <input type="text" id="adminId" required class="w-full mt-2 p-4 rounded-xl input-vortex text-sm" placeholder="Masukkan ID">
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">Access Key</label>
                <input type="password" id="accessKey" required class="w-full mt-2 p-4 rounded-xl input-vortex text-sm" placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl font-bold uppercase tracking-widest text-xs hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-blue-500/20">
                Verify Identity
            </button>
        </form>

        <div class="mt-8 text-center">
            <span class="text-[9px] text-gray-600 font-mono">VORTEX SECURITY PROTOCOL v4.0</span>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "SCANNING...";
            btn.style.opacity = "0.7";

            // Simulasi proses "Verify" 1.5 saat
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>

</body>
</html>
