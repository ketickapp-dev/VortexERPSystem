<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex UI - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fallback untuk elakkan skrin putih masa loading */
        html, body {
            background-color: #05070a !important;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* Kesan Glow di belakang kad */
        .glow-card {
            position: relative;
            width: 340px;
            padding: 1.5px;
            border-radius: 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #0055ff 100%);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Kandungan Glassmorphism */
        .glass-inner {
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 23px;
            padding: 28px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animasi Nadi (Pulse) untuk Status */
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 12px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        /* Glassmorphism Button */
        .btn-vortex {
            background: linear-gradient(135deg, #0066ff 0%, #0044cc 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
    </style>
</head>
<body class="overflow-hidden">

    <div class="fixed inset-0 z-0 opacity-30">
        <svg width="100%" height="100%">
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0" />
                    <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
                </linearGradient>
            </defs>
            <rect x="-100%" y="15%" width="100%" height="1" fill="url(#grad1)">
                <animate attributeName="x" from="-100%" to="100%" dur="8s" repeatCount="indefinite" />
            </rect>
            <rect x="-100%" y="45%" width="100%" height="1" fill="url(#grad1)">
                <animate attributeName="x" from="-100%" to="100%" dur="12s" repeatCount="indefinite" begin="2s" />
            </rect>
            <rect x="-100%" y="75%" width="100%" height="1" fill="url(#grad1)">
                <animate attributeName="x" from="-100%" to="100%" dur="6s" repeatCount="indefinite" begin="1s" />
            </rect>
            <rect x="-100%" y="90%" width="100%" height="1" fill="url(#grad1)">
                <animate attributeName="x" from="-100%" to="100%" dur="15s" repeatCount="indefinite" begin="4s" />
            </rect>
        </svg>
    </div>

    <div class="relative z-10 glow-card hover:scale-105">
        <div class="glass-inner text-center md:text-left">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold tracking-[0.3em] text-cyan-400 uppercase">Vortex Node 01</span>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-gray-400 font-mono uppercase tracking-widest">Encrypted</span>
                    <span class="status-dot"></span>
                </div>
            </div>
            
            <h2 class="text-2xl font-bold mb-2 tracking-tight">Live Intelligence</h2>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">Sistem automasi pintar menguruskan ekosistem perniagaan anda secara masa nyata.</p>
            
            <div class="space-y-5">
                <div>
                    <div class="flex justify-between text-[11px] font-mono mb-2">
                        <span class="text-gray-500 uppercase">Security Layer</span>
                        <span class="text-cyan-400 font-bold">92% SECURE</span>
                    </div>
                    <div class="w-full bg-gray-800/50 rounded-full h-1.5 p-[1px]">
                        <div class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full rounded-full shadow-[0_0_10px_#00d4ff]" style="width: 92%"></div>
                    </div>
                </div>

                <div class="flex items-center gap-4 py-2">
                    <div class="flex-1 border-r border-gray-800">
                        <div class="text-[10px] text-gray-500 uppercase mb-1 font-bold tracking-tighter">Uptime</div>
                        <div class="text-sm font-mono text-white">99.98%</div>
                    </div>
                    <div class="flex-1 pl-2">
                        <div class="text-[10px] text-gray-500 uppercase mb-1 font-bold tracking-tighter">Traffic</div>
                        <div class="text-sm font-mono text-white">1.2k/s</div>
                    </div>
                </div>
            </div>

            <button onclick="window.location.href='dashboard.html'" class="btn-vortex mt-8 w-full py-4 rounded-xl text-xs font-bold transition-all duration-300 hover:brightness-125 active:scale-95 tracking-[0.2em] uppercase">
                Access Command Center
            </button>
        </div>
    </div>

</body>
</html>
